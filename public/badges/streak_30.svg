<?xml version="1.0" encoding="UTF-8"?>
<!--
  30일 연속 출석 배지 — streak 30.
  - 불꽃 모양 + "30" 숫자
  - 빨강/주황 그라데이션 (열정)
  - 출석 시스템 마일스톤 보상용
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="flameOuter" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#dc2626" />
      <stop offset="60%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#fbbf24" />
    </linearGradient>
    <linearGradient id="flameInner" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#fef3c7" />
    </linearGradient>
  </defs>

  <!-- 외곽 불꽃 (큰 모양) -->
  <path
    d="M 100 22
       C 120 50, 150 70, 152 110
       C 154 150, 130 178, 100 178
       C 70 178, 46 150, 48 110
       C 50 70, 80 50, 100 22 Z"
    fill="url(#flameOuter)"
    stroke="#7f1d1d"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- 안쪽 불꽃 -->
  <path
    d="M 100 70
       C 113 90, 128 100, 128 125
       C 128 150, 115 165, 100 165
       C 85 165, 72 150, 72 125
       C 72 100, 87 90, 100 70 Z"
    fill="url(#flameInner)"
    opacity="0.85"
  />

  <!-- "30" 숫자 -->
  <text
    x="100"
    y="142"
    text-anchor="middle"
    font-family="'Arial Black', sans-serif"
    font-size="44"
    font-weight="900"
    fill="#7f1d1d"
  >30</text>
</svg>
