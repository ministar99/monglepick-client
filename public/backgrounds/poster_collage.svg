<?xml version="1.0" encoding="UTF-8"?>
<!-- 배경 - 영화 포스터 콜라주. 다양한 색의 포스터 사각형들이 다양한 각도로 겹친 패턴 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" preserveAspectRatio="xMidYMid slice">
  <rect width="400" height="400" fill="#1f2937"/>
  <g stroke="#0f172a" stroke-width="2">
    <rect x="20"  y="30"  width="80" height="120" fill="#dc2626" transform="rotate(-8 60 90)"/>
    <rect x="120" y="50"  width="80" height="120" fill="#f59e0b" transform="rotate(5 160 110)"/>
    <rect x="220" y="20"  width="80" height="120" fill="#3b82f6" transform="rotate(-4 260 80)"/>
    <rect x="310" y="60"  width="80" height="120" fill="#8b5cf6" transform="rotate(7 350 120)"/>
    <rect x="40"  y="180" width="80" height="120" fill="#10b981" transform="rotate(6 80 240)"/>
    <rect x="140" y="200" width="80" height="120" fill="#ef4444" transform="rotate(-5 180 260)"/>
    <rect x="240" y="180" width="80" height="120" fill="#fbbf24" transform="rotate(8 280 240)"/>
    <rect x="320" y="220" width="80" height="120" fill="#0891b2" transform="rotate(-7 360 280)"/>
    <rect x="60"  y="310" width="80" height="120" fill="#ec4899" transform="rotate(-6 100 370)"/>
    <rect x="170" y="320" width="80" height="120" fill="#7c3aed" transform="rotate(4 210 380)"/>
    <rect x="280" y="310" width="80" height="120" fill="#f97316" transform="rotate(-3 320 370)"/>
  </g>
  <!-- 어두운 오버레이 (가독성) -->
  <rect width="400" height="400" fill="#0f172a" opacity="0.35"/>
</svg>
