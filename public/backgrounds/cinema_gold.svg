<?xml version="1.0" encoding="UTF-8"?>
<!-- 배경 - 시네마 골드 패턴. 짙은 검정 + 황금 필름릴/카메라 아이콘 산포 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="cgBg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="goldFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#cgBg)"/>

  <!-- 필름 릴 4개 (다양한 위치) -->
  <g fill="url(#goldFill)" stroke="#92400e" stroke-width="1" opacity="0.85">
    <g transform="translate(60 60)">
      <circle cx="0" cy="0" r="22"/>
      <circle cx="0" cy="0" r="6" fill="#020617"/>
      <circle cx="-12" cy="0" r="3" fill="#020617"/>
      <circle cx="12" cy="0" r="3" fill="#020617"/>
      <circle cx="0" cy="-12" r="3" fill="#020617"/>
      <circle cx="0" cy="12" r="3" fill="#020617"/>
    </g>
    <g transform="translate(320 100)">
      <circle cx="0" cy="0" r="18"/>
      <circle cx="0" cy="0" r="5" fill="#020617"/>
      <circle cx="-10" cy="0" r="2.5" fill="#020617"/>
      <circle cx="10" cy="0" r="2.5" fill="#020617"/>
    </g>
    <g transform="translate(100 280)">
      <circle cx="0" cy="0" r="20"/>
      <circle cx="0" cy="0" r="6" fill="#020617"/>
      <circle cx="-11" cy="0" r="3" fill="#020617"/>
      <circle cx="11" cy="0" r="3" fill="#020617"/>
    </g>
    <g transform="translate(330 320)">
      <circle cx="0" cy="0" r="22"/>
      <circle cx="0" cy="0" r="6" fill="#020617"/>
      <circle cx="-12" cy="0" r="3" fill="#020617"/>
      <circle cx="12" cy="0" r="3" fill="#020617"/>
    </g>
  </g>

  <!-- 카메라 아이콘 2개 -->
  <g fill="url(#goldFill)" stroke="#92400e" stroke-width="1" opacity="0.8">
    <g transform="translate(180 160)">
      <rect x="-25" y="-15" width="50" height="30" rx="4"/>
      <circle cx="0" cy="0" r="10" fill="#020617"/>
      <circle cx="0" cy="0" r="6" fill="url(#goldFill)"/>
      <rect x="-26" y="-22" width="14" height="8" rx="2"/>
    </g>
    <g transform="translate(240 280)">
      <rect x="-22" y="-13" width="44" height="26" rx="3"/>
      <circle cx="0" cy="0" r="8" fill="#020617"/>
      <circle cx="0" cy="0" r="5" fill="url(#goldFill)"/>
    </g>
  </g>

  <!-- 작은 스파클들 -->
  <g fill="#fbbf24">
    <circle cx="200" cy="50"  r="1.5"/>
    <circle cx="50"  cy="200" r="1.5"/>
    <circle cx="350" cy="200" r="1.5"/>
    <circle cx="280" cy="60"  r="1.5"/>
    <circle cx="160" cy="350" r="1.5"/>
  </g>
</svg>
