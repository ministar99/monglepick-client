<?xml version="1.0" encoding="UTF-8"?>
<!-- 배경 - 로맨스 선셋. 석양 그라데이션 + 야자수 실루엣 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="rsSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7c2d12"/>
      <stop offset="40%"  stop-color="#f97316"/>
      <stop offset="70%"  stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="rsSea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#rsSky)"/>
  <!-- 태양 -->
  <circle cx="200" cy="280" r="60" fill="#fef3c7" opacity="0.85"/>
  <circle cx="200" cy="280" r="50" fill="#fbbf24"/>
  <!-- 바다 (태양 아래) -->
  <rect x="0" y="280" width="400" height="120" fill="url(#rsSea)"/>
  <!-- 바다 반사 라인 -->
  <g stroke="#fef3c7" stroke-width="1" opacity="0.5">
    <line x1="100" y1="300" x2="300" y2="300"/>
    <line x1="60"  y1="320" x2="340" y2="320"/>
    <line x1="120" y1="340" x2="280" y2="340"/>
    <line x1="80"  y1="360" x2="320" y2="360"/>
  </g>
  <!-- 야자수 실루엣 (왼쪽) -->
  <g fill="#0f172a">
    <rect x="58" y="180" width="6" height="120"/>
    <path d="M 61 180 Q 30 170 20 150 Q 35 175 50 175 Q 60 165 61 180 Z"/>
    <path d="M 61 180 Q 90 170 100 145 Q 80 175 65 175 Q 60 165 61 180 Z"/>
    <path d="M 61 180 Q 25 200 18 220 Q 40 200 55 195 Z"/>
    <path d="M 61 180 Q 95 200 102 220 Q 80 200 65 195 Z"/>
  </g>
  <!-- 야자수 실루엣 (오른쪽) -->
  <g fill="#0f172a">
    <rect x="336" y="200" width="5" height="100"/>
    <path d="M 338 200 Q 360 195 370 175 Q 350 200 343 200 Z"/>
    <path d="M 338 200 Q 315 195 305 175 Q 325 200 343 200 Z"/>
    <path d="M 338 200 Q 360 215 365 230 Q 350 215 343 213 Z"/>
  </g>
</svg>
