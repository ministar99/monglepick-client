<?xml version="1.0" encoding="UTF-8"?>
<!-- 배경 - 누아르 도시. 비 내리는 어두운 도시 야경 흑백 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="ncSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#ncSky)"/>

  <!-- 빌딩 실루엣 -->
  <g fill="#020617">
    <rect x="0"   y="220" width="60"  height="180"/>
    <rect x="55"  y="180" width="40"  height="220"/>
    <rect x="90"  y="240" width="50"  height="160"/>
    <rect x="135" y="160" width="60"  height="240"/>
    <rect x="190" y="200" width="45"  height="200"/>
    <rect x="230" y="140" width="55"  height="260"/>
    <rect x="280" y="190" width="50"  height="210"/>
    <rect x="325" y="220" width="40"  height="180"/>
    <rect x="360" y="180" width="40"  height="220"/>
  </g>

  <!-- 빌딩 창문 노란불 -->
  <g fill="#fbbf24" opacity="0.85">
    <rect x="10"  y="240" width="6" height="6"/>
    <rect x="25"  y="260" width="6" height="6"/>
    <rect x="65"  y="200" width="6" height="6"/>
    <rect x="80"  y="230" width="6" height="6"/>
    <rect x="100" y="270" width="6" height="6"/>
    <rect x="145" y="180" width="6" height="6"/>
    <rect x="160" y="210" width="6" height="6"/>
    <rect x="175" y="250" width="6" height="6"/>
    <rect x="200" y="220" width="6" height="6"/>
    <rect x="215" y="260" width="6" height="6"/>
    <rect x="240" y="160" width="6" height="6"/>
    <rect x="255" y="200" width="6" height="6"/>
    <rect x="270" y="240" width="6" height="6"/>
    <rect x="290" y="220" width="6" height="6"/>
    <rect x="310" y="260" width="6" height="6"/>
    <rect x="335" y="240" width="6" height="6"/>
    <rect x="370" y="200" width="6" height="6"/>
    <rect x="385" y="240" width="6" height="6"/>
  </g>

  <!-- 비 (사선 줄) -->
  <g stroke="#94a3b8" stroke-width="1" opacity="0.45">
    <line x1="20"  y1="0"   x2="0"   y2="40"/>
    <line x1="80"  y1="20"  x2="60"  y2="60"/>
    <line x1="140" y1="0"   x2="120" y2="40"/>
    <line x1="200" y1="40"  x2="180" y2="80"/>
    <line x1="260" y1="0"   x2="240" y2="40"/>
    <line x1="320" y1="20"  x2="300" y2="60"/>
    <line x1="380" y1="0"   x2="360" y2="40"/>
    <line x1="50"  y1="80"  x2="30"  y2="120"/>
    <line x1="170" y1="100" x2="150" y2="140"/>
    <line x1="290" y1="80"  x2="270" y2="120"/>
    <line x1="350" y1="120" x2="330" y2="160"/>
  </g>
</svg>
