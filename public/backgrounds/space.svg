<?xml version="1.0" encoding="UTF-8"?>
<!-- 배경 - 우주 SF. 짙은 보라 nebula + 별빛 + 작은 행성 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="spBg" cx="40%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#581c87"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="planet1" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <radialGradient id="planet2" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#155e75"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#spBg)"/>

  <!-- 별빛 — 밀집 산포 -->
  <g fill="#fff">
    <circle cx="20"  cy="30"  r="1"/>
    <circle cx="50"  cy="60"  r="1.5"/>
    <circle cx="100" cy="20"  r="1"/>
    <circle cx="160" cy="50"  r="1.2"/>
    <circle cx="220" cy="30"  r="1"/>
    <circle cx="290" cy="60"  r="1.5"/>
    <circle cx="340" cy="40"  r="1"/>
    <circle cx="380" cy="100" r="1.2"/>
    <circle cx="370" cy="180" r="1"/>
    <circle cx="350" cy="240" r="1.5"/>
    <circle cx="380" cy="320" r="1"/>
    <circle cx="320" cy="370" r="1.2"/>
    <circle cx="240" cy="380" r="1"/>
    <circle cx="180" cy="370" r="1.5"/>
    <circle cx="120" cy="380" r="1"/>
    <circle cx="60"  cy="370" r="1.2"/>
    <circle cx="20"  cy="340" r="1"/>
    <circle cx="40"  cy="280" r="1.5"/>
    <circle cx="20"  cy="200" r="1"/>
    <circle cx="40"  cy="140" r="1.2"/>
    <circle cx="170" cy="180" r="0.8"/>
    <circle cx="260" cy="220" r="0.8"/>
    <circle cx="220" cy="280" r="0.8"/>
  </g>

  <!-- 큰 별 (4-spike) 3 곳 -->
  <g fill="#fde047">
    <polygon points="80,100 84,114 98,118 84,122 80,136 76,122 62,118 76,114"/>
    <polygon points="320,150 324,164 338,168 324,172 320,186 316,172 302,168 316,164" transform="scale(0.8) translate(70 30)"/>
    <polygon points="200,300 203,310 213,313 203,316 200,326 197,316 187,313 197,310"/>
  </g>

  <!-- 작은 행성 2개 -->
  <circle cx="320" cy="120" r="22" fill="url(#planet1)"/>
  <circle cx="80"  cy="280" r="32" fill="url(#planet2)"/>
  <!-- 행성 고리 -->
  <ellipse cx="320" cy="120" rx="32" ry="6" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.6"/>
</svg>
