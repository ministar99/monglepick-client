<?xml version="1.0" encoding="UTF-8"?>
<!--
  클래퍼보드 (영화 슬레이트) 아바타.
  - 검은 보드 + 흰/검 줄무늬 슬레이트
  - 영화 제작 콘셉트의 클래식 아이템
  - 슬롯 64px 에서 줄무늬가 식별 가능하도록 stripe 폭 충분히 확보
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f2937" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
  </defs>

  <!-- 보드 본체 -->
  <rect x="30" y="78" width="140" height="100" rx="6" fill="url(#boardGrad)" stroke="#0f172a" stroke-width="3" />

  <!-- 슬레이트 (위쪽 회전판) -->
  <path d="M 30 78 L 30 50 L 170 50 L 170 78 Z" fill="#1f2937" stroke="#0f172a" stroke-width="3" />
  <!-- 흑백 줄무늬 (사선) -->
  <polygon points="34,50 60,50 44,78 30,78 30,72" fill="#ffffff" />
  <polygon points="74,50 100,50 84,78 58,78" fill="#ffffff" />
  <polygon points="114,50 140,50 124,78 98,78" fill="#ffffff" />
  <polygon points="154,50 170,50 170,76 138,78" fill="#ffffff" />

  <!-- 보드 텍스트 (영화 제작 정보 모방) -->
  <line x1="50" y1="105" x2="150" y2="105" stroke="#fef3c7" stroke-width="2" stroke-dasharray="4 4" opacity="0.6" />
  <text x="100" y="135" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="bold" fill="#fbbf24">SCENE 1</text>
  <text x="100" y="160" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#e5e7eb" opacity="0.7">TAKE 01</text>

  <!-- 회전축 -->
  <circle cx="170" cy="64" r="3" fill="#fbbf24" />
</svg>
