<?xml version="1.0" encoding="UTF-8"?>
<!--
  별 평론가 아바타.
  - 큰 노란 별 + 안쪽에 작은 별 5개 (★★★★★)
  - "리뷰 아카데미" / 비평가 콘셉트
  - 5점 만점 별점 메타포
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bigStarGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fef3c7" />
      <stop offset="50%" stop-color="#fbbf24" />
      <stop offset="100%" stop-color="#b45309" />
    </linearGradient>
  </defs>

  <!-- 외곽 별 (5각) -->
  <polygon
    points="100,20 122,76 184,80 134,118 152,180 100,144 48,180 66,118 16,80 78,76"
    fill="url(#bigStarGrad)"
    stroke="#92400e"
    stroke-width="3"
    stroke-linejoin="round"
  />

  <!-- 안쪽 어둠 -->
  <polygon
    points="100,55 113,90 152,92 121,116 132,156 100,134 68,156 79,116 48,92 87,90"
    fill="#7c2d12"
    opacity="0.15"
  />

  <!-- 작은 별 5개 (가운데 일렬) — 평점 메타포 -->
  <g fill="#7c2d12">
    <polygon points="55,118 58,124 64,124 60,128 62,134 55,131 48,134 50,128 46,124 52,124" />
    <polygon points="78,118 81,124 87,124 83,128 85,134 78,131 71,134 73,128 69,124 75,124" />
    <polygon points="100,118 103,124 109,124 105,128 107,134 100,131 93,134 95,128 91,124 97,124" />
    <polygon points="122,118 125,124 131,124 127,128 129,134 122,131 115,134 117,128 113,124 119,124" />
    <polygon points="145,118 148,124 154,124 150,128 152,134 145,131 138,134 140,128 136,124 142,124" />
  </g>
</svg>
