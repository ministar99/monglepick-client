<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>몽글픽 아이콘 미리보기</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0D0D1A; color: #fff; font-family: -apple-system, sans-serif; padding: 40px; }
    h1 { text-align: center; margin-bottom: 40px; color: #FFC107; }
    h2 { color: #888; margin-bottom: 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 2px; }
    .section { margin-bottom: 60px; }
    .grid { display: flex; gap: 40px; align-items: center; flex-wrap: wrap; }
    .card {
      background: #1A1A2E; border-radius: 16px; padding: 30px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
    }
    .card img { max-width: 100%; }
    .label { color: #666; font-size: 12px; }
    .sizes { display: flex; gap: 30px; align-items: end; }
    .size-item { text-align: center; }
  </style>
</head>
<body>
  <h1>몽글픽 아이콘 미리보기</h1>

  <div class="section">
    <h2>1. 메인 아이콘 (512x512)</h2>
    <div class="grid">
      <div class="card">
        <img src="monglepick-icon.svg" width="256" height="256">
        <span class="label">monglepick-icon.svg</span>
      </div>
      <div class="card" style="background: #fff;">
        <img src="monglepick-icon.svg" width="200" height="200">
        <span class="label" style="color:#333;">밝은 배경</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>2. 파비콘 (64x64)</h2>
    <div class="sizes">
      <div class="size-item">
        <div class="card"><img src="monglepick-favicon.svg" width="64" height="64"></div>
        <span class="label">64px</span>
      </div>
      <div class="size-item">
        <div class="card"><img src="monglepick-favicon.svg" width="32" height="32"></div>
        <span class="label">32px</span>
      </div>
      <div class="size-item">
        <div class="card"><img src="monglepick-favicon.svg" width="16" height="16"></div>
        <span class="label">16px</span>
      </div>
    </div>
  </div>

  <div class="section">
    <h2>3. 로고 (아이콘 + 텍스트)</h2>
    <div class="card" style="width: 100%; max-width: 700px;">
      <img src="monglepick-logo.svg" width="600">
      <span class="label">monglepick-logo.svg</span>
    </div>
  </div>

  <div class="section">
    <h2>4. 크기별 비교</h2>
    <div class="sizes">
      <div class="size-item">
        <div class="card"><img src="monglepick-icon.svg" width="128" height="128"></div>
        <span class="label">128px (앱 아이콘)</span>
      </div>
      <div class="size-item">
        <div class="card"><img src="monglepick-icon.svg" width="64" height="64"></div>
        <span class="label">64px</span>
      </div>
      <div class="size-item">
        <div class="card"><img src="monglepick-icon.svg" width="48" height="48"></div>
        <span class="label">48px (탭 아이콘)</span>
      </div>
      <div class="size-item">
        <div class="card"><img src="monglepick-icon.svg" width="32" height="32"></div>
        <span class="label">32px</span>
      </div>
    </div>
  </div>
</body>
</html>
