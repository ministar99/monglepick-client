<?xml version="1.0" encoding="UTF-8"?>
<!--
  프레임 - 크리스마스 라이트
  - 진한 녹색 트리 풍 링 + 다채로운 라이트 전구 12개
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="xmasGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#15803d"/>
      <stop offset="80%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#052e16"/>
    </radialGradient>
    <mask id="xmMask">
      <rect width="200" height="200" fill="white"/>
      <circle cx="100" cy="100" r="60" fill="black"/>
    </mask>
  </defs>

  <!-- 녹색 링 본체 -->
  <circle cx="100" cy="100" r="95" fill="url(#xmasGrad)" mask="url(#xmMask)"/>

  <!-- 검은 라이트 줄 (가는 사인 곡선) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#0f172a" stroke-width="1.5" opacity="0.7" stroke-dasharray="4 6"/>

  <!-- 라이트 전구 12개 — 빨강/노랑/파랑/초록 순환 -->
  <g stroke="#0f172a" stroke-width="0.8">
    <circle cx="100" cy="20"  r="5" fill="#ef4444"/>
    <circle cx="140" cy="30"  r="5" fill="#fbbf24"/>
    <circle cx="170" cy="60"  r="5" fill="#3b82f6"/>
    <circle cx="180" cy="100" r="5" fill="#22c55e"/>
    <circle cx="170" cy="140" r="5" fill="#ef4444"/>
    <circle cx="140" cy="170" r="5" fill="#fbbf24"/>
    <circle cx="100" cy="180" r="5" fill="#3b82f6"/>
    <circle cx="60"  cy="170" r="5" fill="#22c55e"/>
    <circle cx="30"  cy="140" r="5" fill="#ef4444"/>
    <circle cx="20"  cy="100" r="5" fill="#fbbf24"/>
    <circle cx="30"  cy="60"  r="5" fill="#3b82f6"/>
    <circle cx="60"  cy="30"  r="5" fill="#22c55e"/>
  </g>

  <!-- 전구 글로우 (각 전구 외곽에 옅은 색상 발광) -->
  <g opacity="0.4">
    <circle cx="100" cy="20"  r="9" fill="#ef4444"/>
    <circle cx="180" cy="100" r="9" fill="#22c55e"/>
    <circle cx="100" cy="180" r="9" fill="#3b82f6"/>
    <circle cx="20"  cy="100" r="9" fill="#fbbf24"/>
  </g>
</svg>
