<?xml version="1.0" encoding="UTF-8"?>
<!--
  프레임 - 영화 필름 스트립
  - 검은 필름 + 양옆 sprocket hole(perforation) 줄
  - 가운데 원형 영역은 비워 아바타가 보이도록 함
  - 안쪽 반지름 60, 바깥쪽 반지름 95
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <mask id="ringMask">
      <rect width="200" height="200" fill="white"/>
      <!-- 가운데 원형 잘라내 아바타 노출 -->
      <circle cx="100" cy="100" r="60" fill="black"/>
    </mask>
  </defs>

  <!-- 필름 본체 (검은 링) -->
  <circle cx="100" cy="100" r="95" fill="#0f172a" mask="url(#ringMask)" />

  <!-- 안쪽/바깥쪽 가는 흰 라인 -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.4" />
  <circle cx="100" cy="100" r="63" fill="none" stroke="#fef3c7" stroke-width="1" opacity="0.4" />

  <!-- sprocket holes — 12 개를 원주 둘레에 균등 배치 -->
  <g fill="#f1f5f9">
    <rect x="96" y="6"   width="8" height="6" rx="1"/>
    <rect x="143.4" y="20.5" width="8" height="6" rx="1" transform="rotate(30 147.4 23.5)"/>
    <rect x="173" y="56.5" width="8" height="6" rx="1" transform="rotate(60 177 59.5)"/>
    <rect x="186" y="97" width="8" height="6" rx="1" transform="rotate(90 190 100)"/>
    <rect x="173" y="137.5" width="8" height="6" rx="1" transform="rotate(120 177 140.5)"/>
    <rect x="143.4" y="173.5" width="8" height="6" rx="1" transform="rotate(150 147.4 176.5)"/>
    <rect x="96" y="188"  width="8" height="6" rx="1"/>
    <rect x="48.6" y="173.5" width="8" height="6" rx="1" transform="rotate(-150 52.6 176.5)"/>
    <rect x="19" y="137.5"  width="8" height="6" rx="1" transform="rotate(-120 23 140.5)"/>
    <rect x="6"  y="97"     width="8" height="6" rx="1" transform="rotate(-90 10 100)"/>
    <rect x="19" y="56.5"   width="8" height="6" rx="1" transform="rotate(-60 23 59.5)"/>
    <rect x="48.6" y="20.5" width="8" height="6" rx="1" transform="rotate(-30 52.6 23.5)"/>
  </g>
</svg>
