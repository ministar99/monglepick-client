<?xml version="1.0" encoding="UTF-8"?>
<!--
  프레임 - 우주 SF
  - 짙은 보라/파랑 nebula 풍 링 + 은하 스파클
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="spaceGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#312e81"/>
      <stop offset="80%" stop-color="#581c87"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <mask id="ssMask">
      <rect width="200" height="200" fill="white"/>
      <circle cx="100" cy="100" r="60" fill="black"/>
    </mask>
  </defs>

  <!-- nebula 본체 -->
  <circle cx="100" cy="100" r="95" fill="url(#spaceGrad)" mask="url(#ssMask)"/>

  <!-- 산란된 별빛 — 흰 작은 점 다수 -->
  <g fill="#fff" mask="url(#ssMask)">
    <circle cx="30"  cy="50"  r="1.5"/>
    <circle cx="60"  cy="20"  r="1"/>
    <circle cx="120" cy="15"  r="1.5"/>
    <circle cx="160" cy="40"  r="1"/>
    <circle cx="180" cy="80"  r="1.5"/>
    <circle cx="170" cy="130" r="1"/>
    <circle cx="150" cy="170" r="1.5"/>
    <circle cx="100" cy="180" r="1"/>
    <circle cx="50"  cy="170" r="1.5"/>
    <circle cx="20"  cy="130" r="1"/>
    <circle cx="14"  cy="90"  r="1.5"/>
    <circle cx="40"  cy="170" r="1"/>
    <circle cx="80"  cy="35"  r="1"/>
    <circle cx="170" cy="65"  r="1"/>
  </g>

  <!-- 큰 별 (4-point spike) — 4 곳 -->
  <g fill="#fde047" stroke="#fef3c7" stroke-width="0.5">
    <polygon points="30,30 32,40 42,42 32,44 30,54 28,44 18,42 28,40"/>
    <polygon points="170,30 172,40 182,42 172,44 170,54 168,44 158,42 168,40"/>
    <polygon points="30,170 32,180 42,182 32,184 30,194 28,184 18,182 28,180" transform="translate(0 -10)"/>
    <polygon points="170,170 172,180 182,182 172,184 170,194 168,184 158,182 168,180" transform="translate(0 -10)"/>
  </g>

  <!-- 안쪽 시안 글로우 트림 -->
  <circle cx="100" cy="100" r="63" fill="none" stroke="#67e8f9" stroke-width="1.5" opacity="0.6"/>
</svg>
