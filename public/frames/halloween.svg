<?xml version="1.0" encoding="UTF-8"?>
<!--
  프레임 - 할로윈 호박
  - 주황 호박색 링 + 검은 거미줄 패턴 (모서리 4 지점)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="hwGrad" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="#f97316"/>
      <stop offset="80%" stop-color="#c2410c"/>
      <stop offset="100%" stop-color="#7c2d12"/>
    </radialGradient>
    <mask id="hwMask">
      <rect width="200" height="200" fill="white"/>
      <circle cx="100" cy="100" r="60" fill="black"/>
    </mask>
  </defs>

  <!-- 호박색 링 본체 -->
  <circle cx="100" cy="100" r="95" fill="url(#hwGrad)" mask="url(#hwMask)"/>

  <!-- 거미줄 패턴 — 4 모서리 코너에서 중앙으로 뻗는 라인 -->
  <g stroke="#0f172a" stroke-width="1.2" fill="none" opacity="0.75">
    <!-- 좌상 거미줄 -->
    <path d="M 20 20 L 60 60"/>
    <path d="M 30 20 Q 35 30 45 35"/>
    <path d="M 20 30 Q 30 35 35 45"/>
    <path d="M 25 50 Q 35 50 50 55"/>
    <!-- 우상 거미줄 -->
    <path d="M 180 20 L 140 60"/>
    <path d="M 170 20 Q 165 30 155 35"/>
    <path d="M 180 30 Q 170 35 165 45"/>
    <path d="M 175 50 Q 165 50 150 55"/>
    <!-- 좌하 거미줄 -->
    <path d="M 20 180 L 60 140"/>
    <path d="M 30 180 Q 35 170 45 165"/>
    <path d="M 20 170 Q 30 165 35 155"/>
    <!-- 우하 거미줄 -->
    <path d="M 180 180 L 140 140"/>
    <path d="M 170 180 Q 165 170 155 165"/>
    <path d="M 180 170 Q 170 165 165 155"/>
  </g>

  <!-- 작은 박쥐 실루엣 (위·아래) -->
  <g fill="#0f172a" opacity="0.85">
    <path d="M 100 12 Q 95 8 92 14 Q 100 16 108 14 Q 105 8 100 12 Z"/>
    <path d="M 100 188 Q 95 192 92 186 Q 100 184 108 186 Q 105 192 100 188 Z"/>
  </g>

  <!-- 외곽/안쪽 윤곽 -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#7c2d12" stroke-width="2" opacity="0.7"/>
  <circle cx="100" cy="100" r="62" fill="none" stroke="#7c2d12" stroke-width="2" opacity="0.7"/>
</svg>
