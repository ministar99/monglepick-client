<?xml version="1.0" encoding="UTF-8"?>
<!--
  프레임 - 다이아몬드 럭셔리
  - DIAMOND 등급 영감의 결정 광택 — 시안/화이트 그라데이션 + 다이아몬드 컷 패턴 12개
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="diaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e0f2fe"/>
      <stop offset="40%"  stop-color="#67e8f9"/>
      <stop offset="70%"  stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#155e75"/>
    </linearGradient>
    <filter id="diaBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <mask id="dlMask">
      <rect width="200" height="200" fill="white"/>
      <circle cx="100" cy="100" r="60" fill="black"/>
    </mask>
  </defs>

  <!-- 외곽 시안 글로우 -->
  <circle cx="100" cy="100" r="98" fill="#a5f3fc" opacity="0.45" filter="url(#diaBlur)"/>

  <!-- 다이아몬드 그라데이션 링 -->
  <circle cx="100" cy="100" r="95" fill="url(#diaGrad)" mask="url(#dlMask)"/>

  <!-- 결정 컷 다이아몬드 12개 — 원주 둘레 균등 -->
  <g fill="#fff" stroke="#0c4a6e" stroke-width="0.5" opacity="0.95">
    <polygon points="100,8  104,14 100,22 96,14"/>
    <polygon points="146,21 150,27 146,35 142,27" transform="rotate(30 146 28)"/>
    <polygon points="178,53 182,59 178,67 174,59" transform="rotate(60 178 60)"/>
    <polygon points="190,99 194,105 190,113 186,105" transform="translate(-2 0) rotate(90 190 105)"/>
    <polygon points="178,145 182,151 178,159 174,151" transform="rotate(120 178 152)"/>
    <polygon points="146,177 150,183 146,191 142,183" transform="rotate(150 146 184)"/>
    <polygon points="100,184 104,190 100,198 96,190" transform="translate(0 -2)"/>
    <polygon points="54,177 58,183 54,191 50,183" transform="rotate(-150 54 184)"/>
    <polygon points="22,145 26,151 22,159 18,151" transform="rotate(-120 22 152)"/>
    <polygon points="10,99 14,105 10,113 6,105" transform="translate(2 0) rotate(-90 10 105)"/>
    <polygon points="22,53 26,59 22,67 18,59" transform="rotate(-60 22 60)"/>
    <polygon points="54,21 58,27 54,35 50,27" transform="rotate(-30 54 28)"/>
  </g>

  <!-- 안쪽 화이트 트림 (스파클) -->
  <circle cx="100" cy="100" r="63" fill="none" stroke="#fff" stroke-width="2" opacity="0.9"/>
  <circle cx="100" cy="100" r="65" fill="none" stroke="#a5f3fc" stroke-width="1" opacity="0.7" filter="url(#diaBlur)"/>
</svg>
