<?xml version="1.0" encoding="UTF-8"?>
<!-- 이펙트 - 펄스 영구. 보라 그라데이션 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="pulsePerm" cx="50%" cy="50%" r="50%">
      <stop offset="80%" stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="92%" stop-color="#c4b5fd" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="pulsePermBlur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="98" fill="url(#pulsePerm)" filter="url(#pulsePermBlur)"/>
  <circle cx="100" cy="100" r="92" fill="none" stroke="#7c3aed" stroke-width="3"/>
  <circle cx="100" cy="100" r="86" fill="none" stroke="#c4b5fd" stroke-width="1.5" opacity="0.75"/>
  <!-- 두번째 외곽 링 (영구 차별화) -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
</svg>
