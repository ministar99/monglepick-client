<?xml version="1.0" encoding="UTF-8"?>
<!-- 이펙트 - 필름 영구 (film). 영구 버전 — 더 진한 색 + 더 많은 sprocket holes -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <mask id="filmRingP">
      <rect width="200" height="200" fill="white"/>
      <circle cx="100" cy="100" r="55" fill="black"/>
    </mask>
  </defs>
  <circle cx="100" cy="100" r="92" fill="#0f172a" opacity="0.7" mask="url(#filmRingP)"/>
  <!-- sprocket holes 12 -->
  <g fill="#fef3c7">
    <rect x="96" y="12" width="8" height="6" rx="1"/>
    <rect x="142" y="22" width="8" height="6" rx="1" transform="rotate(30 146 25)"/>
    <rect x="172" y="56" width="8" height="6" rx="1" transform="rotate(60 176 59)"/>
    <rect x="184" y="96" width="6" height="8" rx="1"/>
    <rect x="172" y="138" width="8" height="6" rx="1" transform="rotate(120 176 141)"/>
    <rect x="142" y="172" width="8" height="6" rx="1" transform="rotate(150 146 175)"/>
    <rect x="96" y="184" width="8" height="6" rx="1"/>
    <rect x="50" y="172" width="8" height="6" rx="1" transform="rotate(-150 54 175)"/>
    <rect x="20" y="138" width="8" height="6" rx="1" transform="rotate(-120 24 141)"/>
    <rect x="10" y="96" width="6" height="8" rx="1"/>
    <rect x="20" y="56" width="8" height="6" rx="1" transform="rotate(-60 24 59)"/>
    <rect x="50" y="22" width="8" height="6" rx="1" transform="rotate(-30 54 25)"/>
  </g>
  <circle cx="100" cy="100" r="14" fill="none" stroke="#fbbf24" stroke-width="2.5"/>
  <circle cx="100" cy="100" r="4" fill="#fbbf24"/>
  <!-- 4 spokes -->
  <g stroke="#fbbf24" stroke-width="2" opacity="0.85">
    <line x1="100" y1="86" x2="100" y2="63"/>
    <line x1="100" y1="114" x2="100" y2="137"/>
    <line x1="86" y1="100" x2="63" y2="100"/>
    <line x1="114" y1="100" x2="137" y2="100"/>
  </g>
</svg>
